[env]
PULUMI_STACK = "local"
K8S_NAMESPACE = "food-ordering"
WEB_API_BASE_URL = "http://127.0.0.1:18081"
PULUMI_CONFIG_PASSPHRASE = "local-dev-passphrase"
PROD_STACK = "prod"
PROD_K8S_NAMESPACE = "food-ordering"
PROD_IMAGE_PULL_POLICY = "Always"
PROD_MONGO_IMAGE = "mongo:7"
PROD_AUTH_ALLOW_SELF_ASSIGN_ROLES = "false"

[tasks.preflight]
description = "Validate required local tools and env file"
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

require_cmd() {
  local cmd="$1"
  if ! command -v "$cmd" >/dev/null 2>&1; then
    echo "Missing required command: $cmd" >&2
    exit 1
  fi
}

require_cmd docker
require_cmd kubectl
require_cmd pulumi
require_cmd curl

if [[ ! -f "$WEB_ENV_FILE" ]]; then
  echo "Missing web env file: $WEB_ENV_FILE" >&2
  exit 1
fi

echo "Preflight OK"
'''

[tasks.kube-check]
description = "Validate Kubernetes cluster connectivity"
depends = ["preflight"]
run = '''
set -euo pipefail
kubectl cluster-info >/dev/null
echo "Kubernetes connectivity OK"
'''

[tasks.build-api-image]
description = "Build coordination API image"
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
docker build -t food-coordination-api:prod "$ROOT_DIR/coordination_api"
'''

[tasks.build-vendor-image]
description = "Build vendor mocks image"
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
docker build -t food-vendor-mocks:prod "$ROOT_DIR/external_services_mocks"
'''

[tasks.build-web-image]
description = "Build web UI image"
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

get_env_var() {
  local key="$1"
  local file="$2"
  awk -F= -v target="$key" '$1 == target {print substr($0, index($0, "=")+1)}' "$file" | tail -n 1 | sed -e 's/^"//' -e 's/"$//'
}

ALLOWED_EMAIL_DOMAINS="$(get_env_var NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS "$WEB_ENV_FILE")"

docker build \
  -t food-web-ui:prod \
  --build-arg NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS="$ALLOWED_EMAIL_DOMAINS" \
  --build-arg NEXT_PUBLIC_API_BASE_URL="${WEB_API_BASE_URL}" \
  "$ROOT_DIR/web_ui"
'''

[tasks.build-images]
description = "Build all application images"
depends = ["build-api-image", "build-vendor-image", "build-web-image"]
run = 'echo "Image build stage complete"'

[tasks.pulumi-login]
description = "Login Pulumi to local backend"
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
PULUMI_BACKEND_URL="${PULUMI_BACKEND_URL:-file://$DEPLOY_DIR/.pulumi}"
mkdir -p "$DEPLOY_DIR/.pulumi"
pulumi login "$PULUMI_BACKEND_URL" >/dev/null
echo "Pulumi login OK"
'''

[tasks.pulumi-stack]
description = "Select or create Pulumi stack"
depends = ["pulumi-login"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
(cd "$DEPLOY_DIR" && pulumi stack select "${PULUMI_STACK}" --create)
'''

[tasks.pulumi-config]
description = "Set Pulumi config values for local deployment"
depends = ["pulumi-stack"]
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

get_env_var() {
  local key="$1"
  local file="$2"
  awk -F= -v target="$key" '$1 == target {print substr($0, index($0, "=")+1)}' "$file" | tail -n 1 | sed -e 's/^"//' -e 's/"$//'
}

ALLOWED_EMAIL_DOMAINS="$(get_env_var NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS "$WEB_ENV_FILE")"
JWT_SIGNING_KEY="$(get_env_var JWT_SIGNING_KEY "$WEB_ENV_FILE")"

if [[ -z "$JWT_SIGNING_KEY" ]]; then
  echo "JWT_SIGNING_KEY not found in $WEB_ENV_FILE" >&2
  exit 1
fi

(cd "$DEPLOY_DIR" && \
  pulumi config set namespace "${K8S_NAMESPACE}" && \
  pulumi config set webApiBaseUrl "${WEB_API_BASE_URL}" && \
  pulumi config set apiImage "food-coordination-api:prod" && \
  pulumi config set webImage "food-web-ui:prod" && \
  pulumi config set vendorImage "food-vendor-mocks:prod" && \
  pulumi config set mongoImage "${MONGO_IMAGE:-mongo:7}" && \
  pulumi config set imagePullPolicy "IfNotPresent" && \
  pulumi config set authAllowSelfAssignRoles "${AUTH_ALLOW_SELF_ASSIGN_ROLES:-true}" && \
  pulumi config set --secret jwtSigningKey "$JWT_SIGNING_KEY" && \
  pulumi config set allowedEmailDomains "$ALLOWED_EMAIL_DOMAINS")
'''

[tasks.pulumi-up]
description = "Deploy or update stack with Pulumi"
depends = ["kube-check", "build-images", "pulumi-config"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
(cd "$DEPLOY_DIR" && pulumi up -y)
'''

[tasks.rollout]
description = "Wait for all deployments to become ready"
depends = ["pulumi-up"]
run = '''
set -euo pipefail
NAMESPACE="${K8S_NAMESPACE}"
kubectl -n "$NAMESPACE" rollout status deployment/mongodb --timeout=240s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-pizza --timeout=240s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-sushi --timeout=240s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-taco --timeout=240s
kubectl -n "$NAMESPACE" rollout status deployment/coordination-api --timeout=240s
kubectl -n "$NAMESPACE" rollout status deployment/web-ui --timeout=240s
'''

[tasks.port-forward-api]
description = "Port-forward API service on localhost:18081"
run = '''
set -euo pipefail
kubectl -n "${K8S_NAMESPACE}" port-forward svc/coordination-api 18081:8080
'''

[tasks.port-forward-web]
description = "Port-forward web service on localhost:18080"
run = '''
set -euo pipefail
kubectl -n "${K8S_NAMESPACE}" port-forward svc/web-ui 18080:3000
'''

[tasks.smoke]
description = "Run smoke tests through temporary port-forwards"
depends = ["rollout"]
run = '''
set -euo pipefail
NAMESPACE="${K8S_NAMESPACE}"

wait_for_http() {
  local url="$1"
  local attempts="${2:-30}"
  local sleep_seconds="${3:-2}"

  local i
  for ((i=1; i<=attempts; i++)); do
    if curl -fsS "$url" >/dev/null 2>&1; then
      return 0
    fi
    sleep "$sleep_seconds"
  done

  echo "Timed out waiting for $url" >&2
  return 1
}

PF_API_LOG="$(mktemp)"
PF_WEB_LOG="$(mktemp)"

kubectl -n "$NAMESPACE" port-forward svc/coordination-api 18081:8080 >"$PF_API_LOG" 2>&1 &
PF_API_PID=$!

kubectl -n "$NAMESPACE" port-forward svc/web-ui 18080:3000 >"$PF_WEB_LOG" 2>&1 &
PF_WEB_PID=$!

cleanup() {
  kill "$PF_API_PID" "$PF_WEB_PID" >/dev/null 2>&1 || true
  wait "$PF_API_PID" "$PF_WEB_PID" >/dev/null 2>&1 || true
  rm -f "$PF_API_LOG" "$PF_WEB_LOG"
}
trap cleanup EXIT

wait_for_http "http://127.0.0.1:18081/api/vendors"
wait_for_http "http://127.0.0.1:18080/auth"

VENDOR_COUNT="$(curl -fsS "http://127.0.0.1:18081/api/vendors" | tr -d '\n' | grep -o 'service_id' | wc -l | tr -d ' ')"
WEB_STATUS="$(curl -o /dev/null -s -w '%{http_code}' "http://127.0.0.1:18080/auth")"

if [[ "$VENDOR_COUNT" -lt 3 ]]; then
  echo "Smoke test failed: expected at least 3 vendors, got $VENDOR_COUNT" >&2
  exit 1
fi

case "$WEB_STATUS" in
  200|301|302|307|308) ;;
  *)
    echo "Smoke test failed: unexpected web /auth status $WEB_STATUS" >&2
    exit 1
    ;;
esac

echo "Smoke tests passed"
echo "API test endpoint: http://127.0.0.1:18081/api/vendors"
echo "Web auth endpoint: http://127.0.0.1:18080/auth"
'''

[tasks.status]
description = "Show Kubernetes status for deployed resources"
run = '''
set -euo pipefail
kubectl -n "${K8S_NAMESPACE}" get deployments,pods,svc
'''

[tasks.deploy-local]
description = "Atomic local deployment pipeline (build, deploy, verify)"
depends = ["smoke"]
run = 'echo "Local deployment completed"'

[tasks.prod-preflight]
description = "Validate production deployment inputs for Pulumi on Kubernetes"
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

require_cmd() {
  local cmd="$1"
  if ! command -v "$cmd" >/dev/null 2>&1; then
    echo "Missing required command: $cmd" >&2
    exit 1
  fi
}

require_var() {
  local key="$1"
  local value="${!key:-}"
  if [[ -z "$value" ]]; then
    echo "Missing required env var: $key" >&2
    exit 1
  fi
}

require_cmd docker
require_cmd kubectl
require_cmd pulumi
require_cmd curl

require_var PROD_API_IMAGE
require_var PROD_WEB_IMAGE
require_var PROD_VENDOR_IMAGE
require_var PROD_WEB_API_BASE_URL

JWT_CANDIDATE="${PROD_JWT_SIGNING_KEY:-}"
if [[ -z "$JWT_CANDIDATE" && -f "$WEB_ENV_FILE" ]]; then
  JWT_CANDIDATE="$(awk -F= '$1 == "JWT_SIGNING_KEY" {print substr($0, index($0, "=")+1)}' "$WEB_ENV_FILE" | tail -n 1 | sed -e 's/^"//' -e 's/"$//')"
fi

if [[ -z "$JWT_CANDIDATE" ]]; then
  echo "Provide PROD_JWT_SIGNING_KEY (or JWT_SIGNING_KEY in $WEB_ENV_FILE)." >&2
  exit 1
fi

echo "Production preflight OK"
'''

[tasks.kube-check-prod]
description = "Validate production Kubernetes connectivity"
depends = ["prod-preflight"]
run = '''
set -euo pipefail
kubectl cluster-info >/dev/null
echo "Production Kubernetes connectivity OK"
'''

[tasks.build-api-image-prod]
description = "Build production coordination API image"
depends = ["prod-preflight"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
docker build -t "${PROD_API_IMAGE}" "$ROOT_DIR/coordination_api"
'''

[tasks.build-vendor-image-prod]
description = "Build production vendor mocks image"
depends = ["prod-preflight"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
docker build -t "${PROD_VENDOR_IMAGE}" "$ROOT_DIR/external_services_mocks"
'''

[tasks.build-web-image-prod]
description = "Build production web UI image with production API URL"
depends = ["prod-preflight"]
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

ALLOWED_EMAIL_DOMAINS="${PROD_ALLOWED_EMAIL_DOMAINS:-}"
if [[ -z "$ALLOWED_EMAIL_DOMAINS" && -f "$WEB_ENV_FILE" ]]; then
  ALLOWED_EMAIL_DOMAINS="$(awk -F= '$1 == "NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS" {print substr($0, index($0, "=")+1)}' "$WEB_ENV_FILE" | tail -n 1 | sed -e 's/^"//' -e 's/"$//')"
fi

docker build \
  -t "${PROD_WEB_IMAGE}" \
  --build-arg NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS="$ALLOWED_EMAIL_DOMAINS" \
  --build-arg NEXT_PUBLIC_API_BASE_URL="${PROD_WEB_API_BASE_URL}" \
  "$ROOT_DIR/web_ui"
'''

[tasks.build-images-prod]
description = "Build all production images"
depends = ["build-api-image-prod", "build-vendor-image-prod", "build-web-image-prod"]
run = 'echo "Production image build stage complete"'

[tasks.push-api-image-prod]
description = "Push production API image"
depends = ["build-api-image-prod"]
run = '''
set -euo pipefail
docker push "${PROD_API_IMAGE}"
'''

[tasks.push-vendor-image-prod]
description = "Push production vendor image"
depends = ["build-vendor-image-prod"]
run = '''
set -euo pipefail
docker push "${PROD_VENDOR_IMAGE}"
'''

[tasks.push-web-image-prod]
description = "Push production web image"
depends = ["build-web-image-prod"]
run = '''
set -euo pipefail
docker push "${PROD_WEB_IMAGE}"
'''

[tasks.push-images-prod]
description = "Push all production images"
depends = ["push-api-image-prod", "push-vendor-image-prod", "push-web-image-prod"]
run = 'echo "Production image push stage complete"'

[tasks.pulumi-stack-prod]
description = "Select or create production Pulumi stack"
depends = ["pulumi-login", "prod-preflight"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
(cd "$DEPLOY_DIR" && pulumi stack select "${PROD_STACK}" --create)
'''

[tasks.pulumi-config-prod]
description = "Set Pulumi config values for production Kubernetes deployment"
depends = ["pulumi-stack-prod"]
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
WEB_ENV_FILE="${WEB_ENV_FILE:-$ROOT_DIR/web_ui/.env.local}"

JWT_SIGNING_KEY="${PROD_JWT_SIGNING_KEY:-}"
if [[ -z "$JWT_SIGNING_KEY" && -f "$WEB_ENV_FILE" ]]; then
  JWT_SIGNING_KEY="$(awk -F= '$1 == "JWT_SIGNING_KEY" {print substr($0, index($0, "=")+1)}' "$WEB_ENV_FILE" | tail -n 1 | sed -e 's/^"//' -e 's/"$//')"
fi

if [[ -z "$JWT_SIGNING_KEY" ]]; then
  echo "Missing PROD_JWT_SIGNING_KEY (or JWT_SIGNING_KEY in $WEB_ENV_FILE)." >&2
  exit 1
fi

ALLOWED_EMAIL_DOMAINS="${PROD_ALLOWED_EMAIL_DOMAINS:-}"
if [[ -z "$ALLOWED_EMAIL_DOMAINS" && -f "$WEB_ENV_FILE" ]]; then
  ALLOWED_EMAIL_DOMAINS="$(awk -F= '$1 == "NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS" {print substr($0, index($0, "=")+1)}' "$WEB_ENV_FILE" | tail -n 1 | sed -e 's/^"//' -e 's/"$//')"
fi

(cd "$DEPLOY_DIR" && \
  pulumi config set namespace "${PROD_K8S_NAMESPACE}" && \
  pulumi config set webApiBaseUrl "${PROD_WEB_API_BASE_URL}" && \
  pulumi config set apiImage "${PROD_API_IMAGE}" && \
  pulumi config set webImage "${PROD_WEB_IMAGE}" && \
  pulumi config set vendorImage "${PROD_VENDOR_IMAGE}" && \
  pulumi config set mongoImage "${PROD_MONGO_IMAGE}" && \
  pulumi config set imagePullPolicy "${PROD_IMAGE_PULL_POLICY}" && \
  pulumi config set authAllowSelfAssignRoles "${PROD_AUTH_ALLOW_SELF_ASSIGN_ROLES}" && \
  pulumi config set --secret jwtSigningKey "$JWT_SIGNING_KEY" && \
  pulumi config set allowedEmailDomains "$ALLOWED_EMAIL_DOMAINS")
'''

[tasks.pulumi-up-prod]
description = "Run pulumi up for production stack"
depends = ["kube-check-prod", "push-images-prod", "pulumi-config-prod"]
run = '''
set -euo pipefail
ROOT_DIR="$(pwd)"
DEPLOY_DIR="$ROOT_DIR/deployment"
(cd "$DEPLOY_DIR" && pulumi up -y)
'''

[tasks.rollout-prod]
description = "Wait for production deployments to become ready"
depends = ["pulumi-up-prod"]
run = '''
set -euo pipefail
NAMESPACE="${PROD_K8S_NAMESPACE}"
kubectl -n "$NAMESPACE" rollout status deployment/mongodb --timeout=360s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-pizza --timeout=360s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-sushi --timeout=360s
kubectl -n "$NAMESPACE" rollout status deployment/vendor-taco --timeout=360s
kubectl -n "$NAMESPACE" rollout status deployment/coordination-api --timeout=360s
kubectl -n "$NAMESPACE" rollout status deployment/web-ui --timeout=360s
'''

[tasks.smoke-prod]
description = "Production smoke check against configured public API URL"
depends = ["rollout-prod"]
run = '''
set -euo pipefail

API_VENDORS_URL="${PROD_WEB_API_BASE_URL%/}/api/vendors"
PAYLOAD="$(curl -fsS "$API_VENDORS_URL")"
VENDOR_COUNT="$(printf '%s' "$PAYLOAD" | tr -d '\n' | grep -o 'service_id' | wc -l | tr -d ' ')"

if [[ "$VENDOR_COUNT" -lt 3 ]]; then
  echo "Smoke test failed: expected at least 3 vendors, got $VENDOR_COUNT" >&2
  exit 1
fi

echo "Production smoke checks passed"
echo "API vendors endpoint: $API_VENDORS_URL"
'''

[tasks.status-prod]
description = "Show Kubernetes status for production stack resources"
run = '''
set -euo pipefail
kubectl -n "${PROD_K8S_NAMESPACE}" get deployments,pods,svc
'''

[tasks.deploy-production]
description = "Atomic production deployment pipeline for EC2 Kubernetes (build, push, Pulumi deploy, rollout, smoke)"
depends = ["smoke-prod"]
run = 'echo "Production deployment completed"'

[tasks.first-time-setup]
description = "Install local dependencies and initialize local env for first run"
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
WEB_DIR="$ROOT_DIR/web_ui"
API_DIR="$ROOT_DIR/coordination_api"
WEB_ENV_FILE="$WEB_DIR/.env.local"

require_cmd() {
  local cmd="$1"
  if ! command -v "$cmd" >/dev/null 2>&1; then
    echo "Missing required command: $cmd" >&2
    exit 1
  fi
}

require_cmd pnpm
require_cmd go

if [[ ! -d "$WEB_DIR/node_modules" ]]; then
  echo "Installing frontend dependencies..."
  pnpm --dir "$WEB_DIR" install
else
  echo "Frontend dependencies already installed; skipping."
fi

echo "Downloading Go module dependencies..."
go -C "$API_DIR" mod download

if [[ ! -s "$WEB_ENV_FILE" ]]; then
  cat >"$WEB_ENV_FILE" <<'EOF'
NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8080
JWT_SIGNING_KEY=local-dev-signing-key
EOF
  echo "Initialized $WEB_ENV_FILE with local defaults."
else
  echo "$WEB_ENV_FILE already has content; leaving it unchanged."
fi
'''

[tasks.dev-local]
description = "Run web, API, and vendor mocks locally with live reload on localhost:3000"
run = '''
set -euo pipefail

ROOT_DIR="$(pwd)"
WEB_DIR="$ROOT_DIR/web_ui"
API_DIR="$ROOT_DIR/coordination_api"
MOCKS_DIR="$ROOT_DIR/external_services_mocks"

WEB_PORT="${DEV_WEB_PORT:-3000}"
API_PORT="${DEV_API_PORT:-8080}"
MONGO_PORT="${DEV_MONGO_PORT:-27017}"
MONGO_DB="${DEV_MONGO_DB:-food_ordering_local}"
MONGO_CONTAINER="${DEV_MONGO_CONTAINER:-food-ordering-mongo-dev}"
MONGO_IMAGE="${DEV_MONGO_IMAGE:-mongo:7}"
VENDOR_PIZZA_PORT="${DEV_VENDOR_PIZZA_PORT:-4011}"
VENDOR_SUSHI_PORT="${DEV_VENDOR_SUSHI_PORT:-4012}"
VENDOR_TACO_PORT="${DEV_VENDOR_TACO_PORT:-4013}"

trap 'exit 0' INT TERM

require_cmd() {
  local cmd="$1"
  if ! command -v "$cmd" >/dev/null 2>&1; then
    echo "Missing required command: $cmd" >&2
    exit 1
  fi
}

require_cmd docker
require_cmd pnpm
require_cmd air
require_cmd curl

if [[ ! -f "$WEB_DIR/.env.local" ]]; then
  echo "Missing $WEB_DIR/.env.local" >&2
  exit 1
fi

if [[ -n "$(docker container ls --filter "name=^/${MONGO_CONTAINER}$" -q)" ]]; then
  echo "Mongo container already running: $MONGO_CONTAINER"
elif [[ -n "$(docker container ls -a --filter "name=^/${MONGO_CONTAINER}$" -q)" ]]; then
  echo "Starting existing Mongo container: $MONGO_CONTAINER"
  docker start "$MONGO_CONTAINER" >/dev/null
else
  echo "Creating Mongo container: $MONGO_CONTAINER"
  docker run -d --name "$MONGO_CONTAINER" -p "${MONGO_PORT}:27017" "$MONGO_IMAGE" >/dev/null
fi

echo "Waiting for Mongo to accept connections..."
for i in $(seq 1 30); do
  if docker exec "$MONGO_CONTAINER" mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null 2>&1; then
    break
  fi
  sleep 1
done

if ! docker exec "$MONGO_CONTAINER" mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null 2>&1; then
  echo "Mongo did not become ready in time." >&2
  exit 1
fi

VENDOR_URLS="a1b2c3d4-1111-4000-a000-000000000001=Bella Napoli=http://127.0.0.1:${VENDOR_PIZZA_PORT},a1b2c3d4-2222-4000-a000-000000000002=Sakura Sushi=http://127.0.0.1:${VENDOR_SUSHI_PORT},a1b2c3d4-3333-4000-a000-000000000003=El Fuego Taco=http://127.0.0.1:${VENDOR_TACO_PORT}"

echo "Starting local dev stack with live reload..."
echo "Web:    http://127.0.0.1:${WEB_PORT}"
echo "API:    http://127.0.0.1:${API_PORT}/api/vendors"
echo "Vendors: pizza=${VENDOR_PIZZA_PORT}, sushi=${VENDOR_SUSHI_PORT}, taco=${VENDOR_TACO_PORT}"

set +e
pnpm --dir "$WEB_DIR" exec concurrently -k \
  -n web,api,vendor-pizza,vendor-sushi,vendor-taco \
  -c cyan,magenta,yellow,blue,green \
  "cd '$WEB_DIR' && NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:${API_PORT} pnpm exec next dev --port ${WEB_PORT} --hostname 0.0.0.0" \
  "cd '$API_DIR' && PORT=${API_PORT} MONGODB_URI=mongodb://127.0.0.1:${MONGO_PORT} MONGODB_DATABASE=${MONGO_DB} VENDOR_URLS='$VENDOR_URLS' JWT_SIGNING_KEY='${JWT_SIGNING_KEY:-local-dev-signing-key}' AUTH_ALLOW_SELF_ASSIGN_ROLES='${AUTH_ALLOW_SELF_ASSIGN_ROLES:-true}' air" \
  "cd '$WEB_DIR' && pnpm exec json-server --host 127.0.0.1 --watch '$MOCKS_DIR/pizza_place_db.json' --port ${VENDOR_PIZZA_PORT}" \
  "cd '$WEB_DIR' && pnpm exec json-server --host 127.0.0.1 --watch '$MOCKS_DIR/sushi_bar_db.json' --port ${VENDOR_SUSHI_PORT}" \
  "cd '$WEB_DIR' && pnpm exec json-server --host 127.0.0.1 --watch '$MOCKS_DIR/taco_truck_db.json' --port ${VENDOR_TACO_PORT}"
status=$?
set -e

if [[ "$status" -ne 0 && "$status" -ne 130 && "$status" -ne 143 ]]; then
  exit "$status"
fi
'''

[tasks.dev-local-stop]
description = "Stop local dev MongoDB container used by dev-local task"
run = '''
set -euo pipefail
MONGO_CONTAINER="${DEV_MONGO_CONTAINER:-food-ordering-mongo-dev}"

if [[ -n "$(docker container ls --filter "name=^/${MONGO_CONTAINER}$" -q)" ]]; then
  docker stop "$MONGO_CONTAINER" >/dev/null
  echo "Stopped $MONGO_CONTAINER"
  exit 0
fi

echo "Container $MONGO_CONTAINER is not running"
'''
