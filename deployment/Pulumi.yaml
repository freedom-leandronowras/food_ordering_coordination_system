name: food_ordering_coordination_system
description: Local Kubernetes deployment for the Food Ordering Coordination System
runtime: go
config:
  stackMode:
    description: Pulumi runtime mode. Use "local" for Kubernetes stack or "ec2-start" to only start an EC2 instance.
    default: local
  ec2InstanceId:
    description: EC2 instance ID to control when stackMode=ec2-start
    default: ""
  awsRegion:
    description: AWS region for ec2-start mode
    default: us-east-1
  namespace:
    description: Kubernetes namespace for the full application stack
    default: food-ordering
  imagePullPolicy:
    description: Kubernetes image pull policy
    default: IfNotPresent
  apiImage:
    description: Coordination API image tag
    default: food-coordination-api:prod
  webImage:
    description: Web UI image tag
    default: food-web-ui:prod
  vendorImage:
    description: Vendor mocks image tag
    default: food-vendor-mocks:prod
  mongoImage:
    description: MongoDB image tag
    default: mongo:7
  webApiBaseUrl:
    description: Public API base URL consumed by the browser in web-ui
    default: http://127.0.0.1:18081
  allowedEmailDomains:
    description: Optional CSV list for frontend auth domain restrictions
    default: ""
  authAllowSelfAssignRoles:
    description: Whether /api/auth/register may assign manager roles
    default: "false"
  jwtSigningKey:
    description: HMAC key used by coordination-api to sign and verify JWTs
    secret: true
